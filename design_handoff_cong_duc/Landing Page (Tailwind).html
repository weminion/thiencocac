<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thiên Cơ Các · 天機閣 — Tailwind Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet" />

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        ink: { DEFAULT: '#0a0806', 2: '#14100a', 3: '#1f1812' },
        gold: { DEFAULT: '#d4a24b', bright: '#f4cf73', deep: '#8a6a2a' },
        red: { DEFAULT: '#a02828', deep: '#6a1818' },
        cream: { DEFAULT: '#f5ecd9', dim: '#c9bd9e' }
      },
      fontFamily: {
        serif: ['"Cormorant Garamond"', 'serif'],
        sans: ['"Be Vietnam Pro"', 'sans-serif'],
        brush: ['"Ma Shan Zheng"', 'serif']
      },
      animation: {
        float: 'float 12s ease-in-out infinite',
        'float-reverse': 'float 14s ease-in-out infinite reverse',
        twinkle: 'twinkle 6s ease-in-out infinite',
        glow: 'glowPulse 4s ease-in-out infinite',
        'rotate-slow': 'rotate 80s linear infinite',
        bob: 'bob 2s ease-in-out infinite',
        'fade-up': 'fadeUp 0.6s ease',
        'fade-in': 'fadeIn 0.3s ease',
        'pop-in': 'popIn 0.4s cubic-bezier(0.2,0.9,0.3,1.1)'
      },
      keyframes: {
        float: { '0%,100%': { transform: 'translate(0,0)' }, '50%': { transform: 'translate(40px,-30px)' } },
        twinkle: { '0%,100%': { opacity: '0.7' }, '50%': { opacity: '1' } },
        glowPulse: { '0%,100%': { opacity: '0.6', transform: 'scale(0.95)' }, '50%': { opacity: '1', transform: 'scale(1.05)' } },
        rotate: { to: { transform: 'rotate(360deg)' } },
        bob: { '0%,100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(4px)' } },
        fadeUp: { from: { opacity: '0', transform: 'translateY(20px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
        fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
        popIn: { from: { opacity: '0', transform: 'translateY(16px) scale(0.97)' }, to: { opacity: '1', transform: 'translateY(0) scale(1)' } }
      }
    }
  }
};
</script>

<style type="text/tailwindcss">
  @layer utilities {
    .text-balance { text-wrap: balance; }
    .stars {
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(244,207,115,0.8), transparent),
        radial-gradient(1px 1px at 80% 70%, rgba(244,207,115,0.6), transparent),
        radial-gradient(1px 1px at 40% 80%, rgba(244,207,115,0.7), transparent),
        radial-gradient(2px 2px at 65% 20%, rgba(244,207,115,0.5), transparent),
        radial-gradient(1px 1px at 15% 60%, rgba(244,207,115,0.8), transparent),
        radial-gradient(1px 1px at 90% 40%, rgba(244,207,115,0.6), transparent);
    }
  }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: #0a0806; color: #f5ecd9; }
  html { scroll-behavior: smooth; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>
<body>
<div id="app"></div>

<script>
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroKicker": "天機閣 · Thiên Cơ Các",
  "heroTitle": "Thiên cơ khai mở, nhân duyên tỏ tường",
  "heroGoldWord": "tỏ tường",
  "heroSub": "Xem ngày tốt kinh doanh, tra mệnh hợp khắc, luận vận niên 2026 — tất cả trong một nơi, dựa trên cổ pháp truyền thống hơn ngàn năm.",
  "heroCTA": "Khai mở thiên cơ",
  "primaryGold": "#d4a24b",
  "accentRed": "#a02828"
}/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="ngu-hanh.js"></script>
<script type="text/babel" src="tailwind-components.jsx"></script>
</body>
</html>
